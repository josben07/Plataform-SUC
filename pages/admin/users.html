<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Usuarios | SUClassroom
    </title>

    <link rel="stylesheet" href="../../css/reset.css">

    <link rel="stylesheet" href="../../css/variables.css">

    <link rel="stylesheet" href="../../css/global.css">

    <link rel="stylesheet" href="../../css/admin-users.css">

</head>

<body class="admin-users-body">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div>

            <div class="sidebar-logo">

                SUClassroom

            </div>

            <nav class="sidebar-menu">

                <a href="./dashboard.html">

                    Dashboard

                </a>

                <a href="./users.html" class="active-link">

                    Usuarios

                </a>

            </nav>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="users-main">

        <!-- TOP -->

        <div class="users-topbar">

            <div>

                <h1>

                    Gestión de usuarios

                </h1>

                <p>

                    Administra usuarios,
                    roles y accesos.

                </p>

            </div>

            <!-- SEARCH -->

            <input type="text" id="searchUser" placeholder="Buscar usuario...">

        </div>

        <!-- TABLE -->

        <div class="users-table-container">

            <table class="users-table">

                <thead>

                    <tr>

                        <th>
                            Nombre
                        </th>

                        <th>
                            Correo
                        </th>

                        <th>
                            Rol
                        </th>

                        <th>
                            Estado
                        </th>

                        <th>
                            Acciones
                        </th>

                    </tr>

                </thead>

                <tbody id="usersTableBody">

                </tbody>

            </table>

        </div>

    </main>

    <div class="user-modal">
    
        <div class="user-modal-content">
    
            <span class="close-user-modal">
                ✕
            </span>
    
            <h2>
                Editar usuario
            </h2>
    
            <form id="userForm">
    
                <input type="text" id="editUserName" placeholder="Nombre completo" required>
    
                <select id="editUserRole">
    
                    <option value="student">
                        Alumno
                    </option>
    
                    <option value="mentor">
                        Mentor
                    </option>
    
                    <option value="admin">
                        Admin
                    </option>
    
                </select>
    
                <select id="editUserStatus">
    
                    <option value="active">
                        Activo
                    </option>
    
                    <option value="blocked">
                        Bloqueado
                    </option>
    
                </select>
    
                <button type="submit">
                    Guardar cambios
                </button>
    
            </form>
    
        </div>
    
    </div>


    <div class="admin-toast">
        <span id="adminToastMessage">
            Acción realizada
        </span>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/admin-users.js"></script>

</body>

</html>
