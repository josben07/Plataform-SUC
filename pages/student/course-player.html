<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso | SUClassroom</title>
    <link rel="stylesheet" href="../../css/course-player.css">
</head>

<body>

    <div class="player-page">

        <aside class="player-sidebar">

            <a href="./dashboard.html" class="back-link">
                ← Volver
            </a>

            <h2 id="courseTitle">
                Curso
            </h2>

            <p id="courseDescription">
                Cargando contenido...
            </p>

            <div id="modulesList" class="modules-list"></div>

        </aside>

        <main class="player-main">

            <div class="video-panel">

                <span class="player-label">
                    CLASE ACTUAL
                </span>

                <h1 id="lessonTitle">
                    Selecciona una clase
                </h1>

                <div class="video-box" id="videoBox">
                    ▶
                </div>

                <div class="lesson-actions">
                    <button id="completeLessonBtn">
                        Marcar como completada
                    </button>
                </div>

            </div>

            <section class="resources-panel">

                <h3>
                    Recursos de la clase
                </h3>

                <div id="lessonResources"></div>

            </section>

        </main>

    </div>

    <div class="app-toast">
        <span id="appToastMessage">Acción realizada</span>
    </div>

    <script src="../../js/course-player.js"></script>

</body>

</html>
