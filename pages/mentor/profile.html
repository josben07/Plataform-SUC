<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil | Mentor</title>
    <link rel="stylesheet" href="../../css/mentor-profile.css">
</head>

<body>

    <div class="mentor-page">

        <aside class="mentor-sidebar">

            <div class="mentor-logo">SUClassroom</div>

            <nav class="mentor-menu">
                <a href="./dashboard.html">📊 Dashboard</a>
                <a href="./projects.html">🚀 Proyectos</a>
                <a href="./mentorships.html">🎓 Mentorías</a>
                <a href="./students.html">👥 Estudiantes</a>
                <a href="./profile.html" class="active-link">👤 Perfil</a>
            </nav>

        </aside>

        <main class="mentor-main">

            <div class="profile-card">

                <div class="profile-avatar" id="profileAvatar">
                    M
                </div>

                <h1 id="profileName">
                    Mentor
                </h1>

                <p id="profileEmail">
                    mentor@demo.com
                </p>

                <form id="profileForm">

                    <input type="text" id="fullName" placeholder="Nombre completo" required>

                    <input type="email" id="email" placeholder="Correo" disabled>

                    <button type="submit">
                        Guardar cambios
                    </button>

                </form>

            </div>

        </main>

    </div>

    <div class="app-toast">
        <span id="appToastMessage">Acción realizada</span>
    </div>

    <script src="../../js/config.js"></script>

    <script src="../../js/mentor-profile.js"></script>

</body>

</html>
